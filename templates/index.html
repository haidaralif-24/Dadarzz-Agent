<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dadarzz Agent — Chat</title>
    <meta name="description" content="Dadarzz Agent AI chat interface.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Nav -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-brand">
                <span class="brand-icon"><img src="/static/logo.svg" alt="Logo" class="brand-logo"></span>
                <span class="brand-text">Dadarzz Agent</span>
            </div>
            <nav class="sidebar-nav">
                <a href="/chat" class="nav-item active" id="nav-chat">
                    <span class="nav-icon icon icon-chat"></span> Chat
                </a>
                <a href="/log" class="nav-item" id="nav-log">
                    <span class="nav-icon icon icon-chart"></span> Activity Log
                </a>
                <a href="/settings" class="nav-item" id="nav-settings">
                    <span class="nav-icon icon icon-settings"></span> Settings
                </a>
            </nav>
            <div class="sidebar-footer">
                <button class="theme-toggle" id="theme-toggle" title="Toggle dark/light mode">
                    <span id="theme-icon" class="icon icon-moon"></span>
                </button>
                <span class="user-name">{{ user.display_name }}</span>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-main">
            <!-- Mobile Header -->
            <header class="mobile-header">
                <button class="menu-btn" id="menu-btn"><span class="icon icon-menu"></span></button>
                <h1>Dadarzz Agent</h1>
                <button class="theme-toggle-sm" id="theme-toggle-sm"><span class="icon icon-moon"></span></button>
            </header>

            <!-- Shortcut Chips -->
            <div class="shortcut-bar" id="shortcut-bar">
                <button class="chip" data-shortcut="/files"><span class="icon icon-folder"></span> Files</button>
                <button class="chip" data-shortcut="/ask"><span class="icon icon-help"></span> Ask</button>
            </div>

            <!-- Messages Area -->
            <div class="chat-messages" id="chat-box">
                <div class="message assistant">
                    <div class="message-avatar"><img src="/static/logo.svg" alt="DA" class="avatar-logo"></div>
                    <div class="message-content">
                        <p>Hey {{ user.display_name }}! I'm your Dadarzz Agent. I can help manage your local files and answer questions about your documents. Try a shortcut above or just ask me anything!</p>
                    </div>
                </div>
            </div>

            <!-- Input Area -->
            <div class="chat-input-area">
                <form id="chat-form" enctype="multipart/form-data">
                    <div class="input-row">
                        <label class="file-upload-btn" title="Attach a file for /ask">
                            <input type="file" id="file-input" name="file" hidden>
                            <span class="icon icon-paperclip"></span>
                        </label>
                        <input type="text" id="message-input" autocomplete="off"
                               placeholder="Ask me anything, or use a shortcut like /email..." required>
                        <button type="submit" id="send-button" class="send-btn">
                            <span class="send-icon icon icon-send"></span>
                        </button>
                    </div>
                    <div class="file-preview" id="file-preview" style="display:none;">
                        <span id="file-name"></span>
                        <button type="button" class="file-remove" id="file-remove">✕</button>
                    </div>
                </form>
            </div>
        </main>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
